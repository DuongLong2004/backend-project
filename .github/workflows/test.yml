name: CI – Run Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: 🧪 Run 55 Tests
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 📦 Install dependencies
        working-directory: .
        run: npm ci

      - name: ✅ Run tests
        working-directory: .
        run: npm test -- --coverage --ci
        env:
          NODE_ENV: test
          JWT_SECRET: test_secret_key_for_ci
          JWT_REFRESH_SECRET: test_refresh_secret_key_for_ci
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: test_db
          DB_USER: root
          DB_PASS: root
          PORT: 5000