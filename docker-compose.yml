services:
  # ✅ Backend app
  app:
    build: .
    container_name: backend_app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=123456
      - DB_NAME=backend_db
      - DB_PORT=3306
      - JWT_SECRET=super_secret_key_123
      - JWT_REFRESH_SECRET=super_refresh_secret_key_456
      - JWT_EXPIRES_IN=15m
      - NODE_ENV=development
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./src/logs:/app/src/logs
      - ./src/uploads:/app/src/uploads

  # ✅ MySQL database
  mysql:
    image: mysql:8.0
    container_name: backend_mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=backend_db
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 5
      interval: 10s

volumes:
  mysql_data: